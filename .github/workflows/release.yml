name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ───────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            target_cpu: x86-64-v3
            artifact_name: linux-x64
            use_cross: false

          # ── Linux ARM64 (generic — all aarch64 devices) ────────────
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            target_cpu: generic
            artifact_name: linux-arm64-generic
            use_cross: false

          # ── Linux ARM64 (Pi5 / Orange Pi5 — Cortex-A76 optimized) ─
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            target_cpu: cortex-a76
            artifact_name: linux-arm64-pi5
            use_cross: false

          # ── Windows x86_64 ──────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            target_cpu: x86-64-v3
            artifact_name: windows-x64
            use_cross: false

          # ── Windows ARM64 ───────────────────────────────────────────
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            target_cpu: generic
            artifact_name: windows-arm64
            use_cross: false

          # ── macOS x86_64 ───────────────────────────────────────────
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            target_cpu: generic
            artifact_name: macos-x64
            use_cross: false

          # ── macOS ARM64 ────────────────────────────────────────────
          - target: aarch64-apple-darwin
            runner: macos-latest
            target_cpu: apple-m1
            artifact_name: macos-arm64
            use_cross: false

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4



      # ── Frontend build ───────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: ./web
        run: |
          npm ci
          npm run build

      # ── Rust toolchain ───────────────────────────────────────────
      - name: Install cross (ARM64 builds)
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Install Rust target
        if: "!matrix.use_cross"
        run: rustup target add ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: "!matrix.use_cross && runner.os == 'Linux'"
        run: sudo apt-get update && sudo apt-get install -y libcfitsio-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install pkgconfiglite
          $triplet = "${{ matrix.target == 'aarch64-pc-windows-msvc' && 'arm64' || 'x64' }}-windows-static"
          vcpkg install cfitsio:$triplet
          $vcpkg_path = "$env:VCPKG_INSTALLATION_ROOT/installed/$triplet"
          echo "PKG_CONFIG_PATH=$vcpkg_path/lib/pkgconfig" >> $env:GITHUB_ENV
          echo "CFITSIO_STATIC=1" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $env:GITHUB_ENV
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.artifact_name }}

      # ── Build distribution ───────────────────────────────────────
      - name: Build distribution archive
        shell: bash
        run: |
          ./scripts/build-dist.sh \
            --target ${{ matrix.target }} \
            --target-cpu ${{ matrix.target_cpu }} \
            --no-frontend \
            ${{ runner.os == 'Linux' && '--appimage' || '' }} \
            ${{ matrix.use_cross && '--cross' || '' }}

      # ── Upload artifacts ─────────────────────────────────────────
      - name: Upload distribution archives
        uses: actions/upload-artifact@v4
        with:
          name: night-amplifier-${{ matrix.artifact_name }}
          path: |
            dist/*.tar.gz
            dist/*.AppImage
            dist/*.zip
          retention-days: 7

  # ── GitHub Release ───────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.AppImage
            artifacts/**/*.zip
          generate_release_notes: true
          draft: true
