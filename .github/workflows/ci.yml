name: CI
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
 
on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ "main" ]
 
jobs:
  rust-build-all:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libclang-dev libcfitsio-dev
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Archive tests
        run: cargo nextest archive --archive-file tests.tar.zst --no-default-features
      - name: Build benchmarks
        run: cargo bench --no-run --no-default-features
      - name: Archive benchmark binaries
        run: |
          mkdir -p bench-binaries
          for bin in target/release/deps/*benchmark*; do
            if [ -x "$bin" ] && [ ! -d "$bin" ] && [[ ! "$bin" == *.d ]]; then
              cp "$bin" bench-binaries/
            fi
          done
          tar czf bench-binaries.tar.gz bench-binaries/
      - name: Upload Test Archive
        uses: actions/upload-artifact@v4
        with:
          name: tests-archive
          path: tests.tar.zst
          retention-days: 1
      - name: Upload Benchmark Binaries
        uses: actions/upload-artifact@v4
        with:
          name: bench-binaries-archive
          path: bench-binaries.tar.gz
          retention-days: 1
 
  rust-unit-tests:
    needs: rust-build-all
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libclang-dev libcfitsio-dev
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Download Archive
        uses: actions/download-artifact@v4
        with:
          name: tests-archive
      - name: Run unit tests
        run: cargo nextest run --archive-file tests.tar.zst -E 'not (binary(integration_pipeline) or binary(pro_gating_test))'
 
  rust-integration-tests:
    needs: rust-build-all
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libclang-dev libcfitsio-dev
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Download Archive
        uses: actions/download-artifact@v4
        with:
          name: tests-archive
      - name: Run integration tests
        run: cargo nextest run --archive-file tests.tar.zst -E 'binary(integration_pipeline)' --run-ignored all --test-threads 1
 
  rust-benchmarks:
    needs: rust-build-all
    runs-on: ubuntu-24.04
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libclang-dev libcfitsio-dev
      - name: Download Benchmark Binaries
        uses: actions/download-artifact@v4
        with:
          name: bench-binaries-archive
      - name: Run benchmarks
        run: |
          tar xzf bench-binaries.tar.gz
          for bin in bench-binaries/*; do
            if [ -x "$bin" ]; then
              echo "=== Running $(basename $bin) ==="
              "$bin" --bench
            fi
          done
 
  web-tests-and-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: ./web
        run: npm ci
      - name: Run web unit tests
        working-directory: ./web
        run: npm run test:run
      - name: Run web linting
        working-directory: ./web
        run: npm run lint
